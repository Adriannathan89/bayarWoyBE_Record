services:
  db:
    image: postgres:16-alpine
    container_name: bayarwoy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bayarwoy}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bayarwoy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-bayarwoy-app:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bayarwoy-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8080:8080"
    networks:
      - default
      - bayarwoy-net

volumes:
  postgres_data:

networks:
  bayarwoy-net:
    external: true
