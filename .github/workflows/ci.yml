name: Go CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .env for CI
        run: |
          {
            echo "PORT=${{ secrets.PORT }}"
            echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}"
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}"
            echo "JWT_REFRESH_SECRET_KEY=${{ secrets.JWT_REFRESH_SECRET_KEY }}"
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=${{ secrets.DB_PORT }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
          } > .env

      - name: Build application image with Docker Compose
        run: docker compose build app

      - name: Start app stack
        run: docker compose up -d db app

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/auth/validate-session | grep -q "401"; then
              echo "App is reachable"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done

          echo "App did not become ready in time"
          docker compose logs app
          exit 1

      - name: Build CI test image from builder stage
        run: docker build --target builder -t bayarwoy-ci-builder .

      - name: Run tests inside Docker
        run: docker run --rm bayarwoy-ci-builder go test -v -count=1 ./test/...

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down compose stack
        if: always()
        run: docker compose down -v
